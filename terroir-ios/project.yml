name: Terroir
options:
  bundleIdPrefix: com.terroir
  deploymentTarget:
    iOS: "17.0"
  minimumXcodeGenVersion: "2.35"
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_STRICT_CONCURRENCY: complete
    GENERATE_INFOPLIST_FILE: false
packages:
  FlatBuffers:
    url: https://github.com/google/flatbuffers
    version: 25.12.19
targets:
  Terroir:
    type: application
    platform: iOS
    sources:
      - path: Terroir
        excludes:
          - Resources
      - path: Terroir/Resources
        buildPhase: resources
    dependencies:
      - package: FlatBuffers
        product: FlatBuffers
    settings:
      INFOPLIST_FILE: Terroir/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      PRODUCT_BUNDLE_IDENTIFIER: com.terroir.app
  TerroirTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TerroirTests
    dependencies:
      - target: Terroir
    settings:
      GENERATE_INFOPLIST_FILE: true
  TerroirUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TerroirUITests
    dependencies:
      - target: Terroir
    settings:
      GENERATE_INFOPLIST_FILE: true
