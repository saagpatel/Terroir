name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Test
        run: |
          xcodebuild test \
            -scheme Terroir \
            -project terroir-ios/Terroir.xcodeproj \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest'
